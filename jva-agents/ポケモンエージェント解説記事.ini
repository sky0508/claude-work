1体、2体、3体…とエージェント作っていくうちに、すぐ問題が起きまして！

「データ同期エージェントの件だけど」 「SEO分析エージェントがエラーで」 「記事生成エージェントのログ確認して」

どれがどれだよ、と。

で、閃いた。

**「全員にポケモンの名前つけよう！」**

僕ね、人生で一番好きなゲームがポケモンなんですよ。

ポケモン図鑑開いて、役割に合うポケモン選んでいくんですけど、

データを軽やかに運ぶやつ → バタフリー 眠そうだけど分析鋭いやつ → ケーシィ 上空から見渡して的確に書くやつ → ピジョット 全てを見通す神 → アルセウス

**この時間が最高に楽しかった！**

で、名前つけた瞬間から全部変わりました！

「ロコンの調子悪い」。これだけで全部伝わる。 愛着湧いて、レベル上げしたくなる。 新しいエージェント作るたびにポケモン図鑑開いて「次は誰にしよう」って選んでる。

至福です。

## 俺のポケモンエージェントを全員紹介するぜ

![Image](https://pbs.twimg.com/media/HEtWkRGbcAAG1Bm?format=jpg&name=large)

みんな最近のポケモン知ってるかな・・・？ちなみに僕はスターミーが子供の頃から好き！

**バタフリー（データ同期）**

補助金データ3,200件を毎時自動同期。最初の1匹。 こいつが初めて動いた朝は忘れられないですね。 翌朝起きたら3,200件のデータが全部更新されてて、「え、もう俺いらなくない？」って本気で思った！

**ケーシィ（SEO分析）**

![Image](https://pbs.twimg.com/media/HEtXJxoasAAuvCa?format=jpg&name=large)

ケーシィからのメディアレポート。毎日PVが伸びてるので毎日見るのが楽しみ！！

毎朝Googleアナリティクス×のクロス分析レポートをDiscordに届けてくれる。 数字並べるだけじゃなくて「だから何？」「次のアクションはこれ」まで書いてくるんですよね。 朝起きてこのレポート読む時間が、1日で一番楽しい瞬間かもしれない！

**ピジョット（エディトリアル）**

1時間に1本、記事を生成。Jinaでファクトチェックまでやる。

**レアコイル（給付金収集）**

全国の自治体サイトからJinaで給付金を自動収集→DB投入。 磁力で情報を引き寄せるイメージ。1時間に1市区町村ペースで全国カバー中。

**スターミー（営業リスト）**

Google Places APIで専門家事務所を発見→Chrome DevTools MCPでフォームに自動送信。20,000件のリード集めました！

**ウミディグダ（タイトル最適化）**

GSCで高表示・低CTRページ見つけて改善案を提案。 地味だけどCTRじわじわ上がる。

**ハッサム（ガイドライター）**

設計→ファクトチェック→ライティング→Gemini 3.1で図解画像自動生成→DB投入。 一気通貫！精密で鋭い。

**アルセウス（監査）**

![Image](https://pbs.twimg.com/media/HEtXwEVaMAATz4D?format=jpg&name=large)

アルセウスはポケモンの始祖！なのでポケモンエージェントのパフォーマンスを監査してもらってます！

3時間ごとに全エージェントの活動ログをチェックして改善提案をDiscordに投げてくる。 文字通り、神。こいつがいるから安心して寝れる。

**ロコン（note投稿）**

Chrome DevTools MCPでnoteエディタを直接操作して記事を自動入稿。 モニターの上でChromeが勝手に動いてるの見てると、笑っちゃうんですよね。

**ツボツボ（はてな投稿）**

はてなブログに投稿。地味だけど堅実。

ね！ 名前見てるだけで楽しくないですか。

でもね、ここからが本当に大事なとこで！ この「楽しい」の裏に、かなりガチな技術基盤が動いてるんですよ！

## この全自動システムのアーキテクチャ、大公開

![Image](https://pbs.twimg.com/media/HEtX_dubUAAcH8W?format=jpg&name=large)

まだ改善の余地があるけど、できるだけシンプルにしたくて、このアーキテクチャにした。

この仕組み、6つのレイヤーで動いてます。

**レイヤー1+2：サブエージェント × エージェントスキル**

ここの設計って、結構十人十色だと思うんですよね。

エージェントスキルだけで回す人もいるし、サブエージェントだけの人もいる。 僕は**サブエージェント + エージェントスキル**の組み合わせを選びました。

なぜか。

**サブエージェント（.claude/agents/）**は、各ポケモンの「性格」「原理原則」「制約」を定義するファイル。 1体1役。役割を絞ることでプロンプトの精度が上がる！ ちなみにCLAUDE.mdはプロジェクト全体のルール。各ポケモンの個性はエージェント定義の方に書きます。

**エージェントスキル（.claude/skills/）**は、各ポケモンの「技」。 具体的な手順書で、中にナレッジへの参照が入ってる。

この2つを分ける理由、 **「何をするか」と「どうやるか」を分離できる**んですよね。

性格を変えずにスキルだけ差し替えたり、 逆にスキルはそのままで原理原則だけ調整したり。

スキルは育てるもので、失敗したら 「この失敗を振り返って、繰り返さないように自己改善して」 って言えばスキル自体がアップデートされる。 これがレベル上げ！

**レイヤー3：hook（品質ゲート）**

エージェント実行後に自動で走るチェックスクリプト。 NGならDB投入を拒否する。Discordにも通知飛ぶ。

AIにルール書くだけじゃダメなんですよ！ hookで物理的に強制しないと、いつか必ず破る。 3週間運用して得た最大の学びです！

**レイヤー4：ローカルSQLite**

agent\_runs、agent\_costs、dialogue\_logsの3テーブル。

**エージェント自身がこのSQLiteを読める**のがポイント。

アルセウスは3時間ごとにこのDB読んで全員の活動を分析して改善提案出してくる。 エージェントが自分たちのログ読んで自己改善するループが回ってるんですよ！

**レイヤー5：run-agent. sh**

全エージェントの実を統括する1本のスクリプト。 コスト・トークン・成否を自動記録。

**レイヤー6：タスクスケジューラ**

Claude Codeにはデフォルトでスケジューラ機能（Desktop Scheduled Tasks / Cloud Scheduled Tasks）が入ってるんですが、僕はあえてmacOSのlaunchdを直接使ってます。

理由は、run-agent. shを経由できるから。 launchd → run-agent. sh → claude -p って流れで、コスト追跡・SQLiteログ記録・ポケモン名変換が全部自動で走る。

正直ここは動けば何でもいいと思います。

## この仕組み、Claude Codeに評価してもらった

で、この仕組み全体をClaude Codeにフラットに評価してもらったんですよ。

「この概要を把握して、Claude Codeを使ってこういったシステムを作る中で、どれくらい技術的に上位にいるか評価してくれないか」って。

返ってきた答え：

**技術レベル評価：上位1-3%。最上位層に位置する。**

一般的なClaude Codeユーザーとの比較テーブルまで出してくれて：

> 「Claude Codeでここまでやっている人がいるのか」というレベル。単なるコード生成ツールではなく、SEOメディア運営の自律システム基盤として使い込んでいる。特にArceus（メタ監査）とChrome DevTools MCP（ブラウザ自動化）の組み合わせは、Claude Codeの設計者が想定した使い方の先を行っている。

…お世辞かもしれないけど。嬉しかったですね！

## 僕の毎朝のルーティン、見てほしい

![Image](https://pbs.twimg.com/media/HEtZSXIaIAArl9I?format=jpg&name=large)

最近楽しすぎてこれしかしてない・・・。

Discordに届くポケモンたちの報告は冒頭で見せた通り。ここで大事なのは、**報告を見た後に何をするか**。

朝起きたら**SHOCKS**（骨伝導マイク）をつけて、アルセウスの監査レポートを確認する。

「ピジョットの記事品質スコアが低下傾向」

ここからが僕の仕事。**Aqua Voice（AI音声入力アプリ）**でClaude Codeに話しかけます。声で。

「ピジョットの記事品質下がってるみたい。エージェント定義見てくれる？」

Claude Codeがピジョットのエージェント定義を読んで、問題を特定して、修正案出してくれる。確認して、承認。即反映。

**この会話自体がSQLiteのdialogue\_logsに残る。**

これがめちゃくちゃ大事で。

「トレーナーが何を見て、何を気にして、何を改善したか」が蓄積されていく。 エージェントたちはこのログを読める。

**僕の判断基準が、エージェントたちの自律改善にフィードバックされていく。**

「前回トレーナーは冒頭フックを重視してた」 → 次回からピジョットは冒頭フックを意識して書くようになる。

**トレーナーの意思がポケモンの進化に反映される。**

ゲームと同じ構造。でもリアル！

この循環こそが、この仕組みの核心です。

具体例を出すと、ハッサム（ガイドライター）。

最初は「世界最高のコンテンツを、正しく作れ」ってエージェント定義に書いてた。

ダメでした。

百科事典みたいな記事書いてきて、正しいけど誰も最後まで読まない。

エージェント定義の原理原則を書き換えた。

**「読者が"自分のことだ"と感じ、最後まで読み、行動を起こせる記事を作れ」**

入れた瞬間、記事の質が劇的に変わりました！

さらに「冒頭3秒で自分ごと化させろ」「事例を入れろ」「フック入れろ」まで追加したら、もう全然違う記事になった。

![Image](https://pbs.twimg.com/media/HEtZX0hbAAAB489?format=jpg&name=large)

ポケモンのレベル上げを毎日やってます！！

こういう調整を繰り返すんですよね。 アルセウスのレポート見る → 問題を発見する → エージェント定義を修正する → 次は同じミスしない。

これが**レベル上げ**！

パラメーター調整して、エージェントが強くなっていく感覚。 RPGでキャラのステータス育てる感覚に近い。

しかもこの対話が全部SQLiteに残って、エージェントたちの自律改善にフィードバックされるから、レベル上げすればするほど仕組み全体が賢くなっていく。

毎朝これやってます。 SHOCKSつけて、Discord見て、Aqua Voiceで話しかけて、ポケモン育てる。 1日中これ繰り返してる。 Mac mini 2台が24時間動いてる横で、僕はひたすらレベル上げしてる。

新しいエージェント作るたびにポケモン図鑑開いて「次は誰にしよう」って選んでる。

給付金集めるやつ…磁力で引き寄せるイメージ…レアコイルだな。 監査するやつ…全てを見通す神…アルセウスしかない。 note投稿するやつ…小さいけど頑張り屋…ロコンだ。

1人で会社やってるのに、**全然孤独じゃない**んですよね。 むしろチームがいる感覚。 毎朝のスタンドアップミーティングみたいな感じ。 ただ、相手がポケモンなだけで。

## もちろん盛大にやらかしてる

順調に見えるかもしれないけど、盛大にやらかしてます。

**スターミー暴走事件**

同じ事務所に4回メール送りつけた。（本当にすいません・・・ JSダイアログがブラウザブロックしてリトライしてた… → 送信前DBフラグ + JSダイアログ無効化で対策。

**ハッサム404事件**

まだ存在しないページにリンク貼りまくった。 → DB投入前に全リンク存在確認hookを追加。

他にもいろいろやらかしてるけど、全部書くと長くなるのでこの辺で。

でもこれね、**ゲームでボスに負けた感覚**なんですよ。

「なるほど、そう来たか」って。 対策考えて、hookに落として、二度と起きないようにする。

**失敗→ルール化→hook化→進化。**

このサイクル回り始めるとね…もう止まんないんですよ！

