## なぜ10個なのか ── スタートアップの常識が変わった

![Image](https://pbs.twimg.com/media/HEtZ4fWa0AAswhC?format=jpg&name=large)

スタートアップの常識はとっくに変わったぞ！

今までのスタートアップの教科書って、**一点集中・Jカーブ型**だったと思うんですよ。 大規模資金調達、大規模組織、1事業にフルベット。 いろんな事業同時に作ってたら「集中しろ」って怒られてた。

この常識、完全に変わったと思ってます。

なぜか。**AIで事業開発コストが限りなくゼロ円になった**から。

そして**AIは並列できる**。

人間は週40〜50時間が上限で、1つの仕事しかできない。 AIは24時間×7日間、しかもこれを並列でできる。

だから、**AIに事業を並列で作らせて、並列で伸ばす**。 センターピンが明確な事業を10個仕込んで、全部AIに24時間回させる。 どれかが伸びたらそこにリソースを寄せる。

![Image](https://pbs.twimg.com/media/HEtZ8_8asAA5wvt?format=jpg&name=large)

Claude Codeだけで事業をたくさん作ってるぞおおおお

やり方はどの事業でも同じ。

1\. **事業のセンターピンを決める**（人間がやる。絶対に。） 2. **センターピンを因数分解する** 3. **1つ1つを専用エージェント（ポケモン）にする** 4. **24時間スケジューラで回す**

**「何の事業やるか」は、絶対にAIに考えさせちゃダメ。** 無難なものしか出ない。センターピンは人間が決めて、AIはそれを**24時間ぶん回す装置**として使う。

伸びたらまた報告しますね！

