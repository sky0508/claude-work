![Image](https://pbs.twimg.com/media/HEtgQSBaUAAQxHx?format=jpg&name=large)

やばいです！！！

Claude Codeで新規事業を作る自分的ベストプラクティスを見つけてしまいました！超興奮してます！全容をみんなに明かしたい！

先にネタバレしちゃいます。

**サブエージェントにポケモンの名前をつけて、Discordに住まわせて、ポケモンのレベルをひたすら上げていく。**

は？ ってなりますよねw わかります！大丈夫です、順番に話していきますね！

## まず前提の話。

僕は今、**Claude Codeだけで成立する、社員ゼロで回る事業を10個立ち上げる**っていうプロジェクトをやってます。

その第一弾として立ち上げたのが「補助金エージェント」（[hojokin-agent.jp](https://hojokin-agent.jp/)）。

AIで全国の補助金・助成金・給付金を検索できるメディアです。

なぜこれを作ったかっていうと、 僕自身が補助金を申請したり探したりするとき、すごい苦労したんですよ！ 情報が散らばりすぎてて、どこに何があるかわからない。 この不便を解決するサービスを作ろう、と。

で、メディアがめちゃくちゃ伸びてます！

![Image](https://pbs.twimg.com/media/HEtU6NDaMAA9IIz?format=png&name=large)

立ち上げ30日で5万MAU行きそうな感じ・・・！すごい！

で、このサービス、

**社員ゼロ**で回ってます！

回してるの、全員AIエージェント。 しかも全員ポケモンの名前がついてる。

バタフリーが毎時データ同期して、 ケーシィが毎朝SEOレポート出して、 ピジョットが1時間に1本記事書いて、 アルセウスが3時間ごとに全員監査して。

コストは月200ドルのサブスクだけ。

だったんですが！

楽しすぎて事業を10個に増やしたら、1日でサブスクの週間制限が90%に達するようになってしまって。

![Image](https://pbs.twimg.com/media/HEtVHIIakAAi5Es?format=png&name=large)

ClaudeのMAXプラン（$200）を3個契約することに・・・

今はサブスクを**3アカウント契約**して分散稼働させてます。 それでも足りないのでAPIの追加課金もしてます。

それでも、です。

普通の社員を1人雇ったら月何十万円ですよね。 サブスク3つ + API課金でも、その何分の1にもならない。 しかも24時間働いてくれる。

シンギュラリティ、感じてます。まじで！！

朝起きてDiscord開くとね、ポケモンたちから仕事の報告が届いてるんですよ！ 寝てる間に全部終わってる！

![Image](https://pbs.twimg.com/media/HEtVYZrbUAAfdOD?format=jpg&name=large)

AIエージェント＝ポケモンたちが毎日報告してくれる！楽しい！

この時点でもう楽しすぎませんか？

本記事は、Claude Codeで「エージェント × ポケモン × 24時間稼働」の掛け算をやったら新規事業が勝手に回り始めた全記録です。技術的な中身もガッツリ書きます。ウェビナーへのご招待もあります！

## 2026年、AIのテーマは「常駐 × 自律改善」だと確信した

「社員ゼロで事業を10個」って、どうやるのか。

僕個人としては、2026年のAIのテーマは**常駐 × 自律改善**だと確信してます。

常に起動していて、常に勝手に賢くなっていく。

24時間動いてるだけじゃなくて、動くたびに自分で学んで、次はもっといい仕事をする。この2つが掛け合わさった時に、本当の意味での「自動運転」が成立する。

Claude Codeは出てきた初期からずっと触ってて、すごい便利なんですけど、 もともとの前提思想って「人間が対話しながら使う」だったと思うんですよね。 人間が指示出して、AIが返して、また人間が判断して… 対話前提のツール。

そこにOpenClawが出てきた。

正直、セキュリティ的なリスクとか課題点はまだまだ多い。 でも思想としてはめちゃくちゃ面白くて。

**「AIエージェントを24時間稼働させておく」**

この考え方を提示したわけです。

対話前提じゃなくて、常駐前提。 人間がいなくても勝手に動く。

触って5分で思いました。

**「この思想、Claude Codeに移植しちゃおう」**

で、実際にClaude Code側もこの方向に寄せてきてるんですよね。

タスクスケジューラ機能がデフォルトで搭載されたし、2026年3月にはClaude Code Channelsがリリースされて、Discord・Telegram・iMessageからClaude Codeをリモート起動できるようになった。/loop コマンドでポーリングもできる。

明らかに「対話前提」から「常駐前提」にシフトしてきてます。 OpenClawが提示した思想に、Claude Codeが追いついてきた感じ。

OpenClawの思想をClaude Codeに移植して、Claude Codeの安定性と賢さで24時間自動運転させたら… 最強なんじゃないかと！

すぐにMac miniを24時間スリープさせない設定にして、 cmuxのターミナル上でClaude Codeを常駐させました。 macOSのlaunchdで毎時エージェントが起動するようにして。

気がついたらMac miniが2台になってました。

今、50インチと40インチのモニターを2枚並べて、 Claude Codeのセッションをひたすら並べまくってます。 SHOCKSの骨伝導マイクつけて、Aqua VoiceでAIと1日中対話して、 Discordの通知見て、またポケモンのレベル上げて…を繰り返してます。

![Image](https://pbs.twimg.com/media/HEtV9ZvacAAgZWY?format=jpg&name=large)

cmux+Mac Mini+モニタ2台構成！

モニターの上部にはGoogle ChromeのDevTools MCPが常に起動してて。 ログインが必要なサービス（noteとか）はこれを使って全部操作してます。 ブラウザの中でAIが勝手にフォーム入力して、記事を投稿してくれる。 これを目の前で見てるとね、なんかもう笑っちゃうんですよね！

