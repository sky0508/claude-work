この記事でわかること ①AIに"自分の状況"を毎回説明せずに済む環境の作り方 ②自分だけの"理想のコーチ"をAIの中に再現する方法 ③よく使う指示をコマンド化して、朝5分で壁打ちを完了させる仕組み

今回は、NotionAIを"24時間働くコーチ"に変えるための、具体的な3つの設定を紹介します。

設定にかかる時間は、全部合わせても15分程度。 それだけで、AIとの対話の質が根本的に変わります。

## ① コンテキストを登録する

まず最初にやるべきことは、NotionAIに"私の情報"を渡すことです。

NotionAIには「コンテキスト」という仕組みがあります。 これは、AIが回答するときに参考にできる背景情報のこと。

たとえば、タスク管理のデータベース、目標を書いたページ、過去の議事録。これらをコンテキストとして登録しておくと、AIは"私の状況"を把握した上で回答してくれるようになります。

登録方法はシンプルです。

まずはどの画面からでも良いので、右下にいるNotionAIをクリックしてください。

![Image](https://pbs.twimg.com/media/HB5yqTGacAAPR-A?format=jpg&name=large)

チャットが開くのでもう一度NotionAIのお顔をクリックします。

![Image](https://pbs.twimg.com/media/HB5yuBJbIAArryN?format=jpg&name=large)

次に「指示を設定する」→「自分のテンプレートを作成」を選択してください。

![Image](https://pbs.twimg.com/media/HB5yxioawAEBevo?format=jpg&name=large)

そうするとパーソナライズ（NotionAI内のメモリ）が立ち上がります。ここで編集を行なうことで自分だけの専属コーチを作ることができます。

![Image](https://pbs.twimg.com/media/HB5y0y7a4AA06Ha?format=jpg&name=large)

Notionを使っていて、すでにタスクデータベースや議事録データベースを持っている方は、そのデータベースをパーソナライズに登録しておくことで、より参照しやすい状態が作れます。

やり方はとても簡単です。

先ほど紹介したパーソナライズのページを開き、、どこでも良いのでまずはこの＋をクリックします。

![Image](https://pbs.twimg.com/media/HB5zIMlbQAArvg_?format=jpg&name=large)

表示されたメニューを下にスクロールして「ページリンク」を選択してください。

![Image](https://pbs.twimg.com/media/HB5zLRQagAEgeL_?format=jpg&name=large)

そうすると皆さんのNotionの中にあるページやデータベースを検索で探し、参照リンクとして追加できるようになります。

![Image](https://pbs.twimg.com/media/HB5zOKdbcAAy9TO?format=jpg&name=large)

この使い方をマスターしていただくと、パーソナライズに主要なデータベースの役割を理解させて、参照しやすい環境を作ることができます！

![Image](https://pbs.twimg.com/media/HB5zRHHaQAA7vD9?format=jpg&name=large)

私の場合、以下のようなものを登録しています。

・タスク管理のデータベース（今週何をやるか） ・目標ページ（四半期の目標と年間のゴール） ・顧客データベース（誰とどんな案件を進めているか） ・ノートデータベース（議事録・読んだ本のメモ）

AIが返す答えの質は、渡す情報の質で決まります。 まずはここから始めてみてください。

## ② メイン人格を指定する

次にやるのは、AIの"人格"を設定すること。

NotionAIには「メモリ」という機能があります。 チャットの中で「これ覚えておいて」と伝えるだけで、AIがその情報を記憶し、次回以降の対話に反映してくれる仕組みです。

ここに、"理想のコーチ像"をインストールします。

やり方は2つあります。

【方法1：NotebookLMを使う】

Googleが提供しているNotebookLMというサービスを使います。 自分が「この人みたいに考えたい」と思うコーチや経営者のYouTubeをNotebookLMにアップロードして、文字起こしします。

![Image](https://pbs.twimg.com/media/HB50KgGboAAnQ0X?format=jpg&name=large)

そうすると以下のような要件定義書が完成するので、これを先ほど紹介したNotionAIのパーソナライズに登録しておきます。

![Image](https://pbs.twimg.com/media/HB50NtGbgAABahZ?format=jpg&name=large)

すると、毎朝のジャーナリングで対話するAIが、"自分の延長線上の思考"ではなく、"より高い視座を持つ人物の思考"で返してくれるようになる。

これだけで、壁打ちの質が劇的に変わります。

【方法2：AIミーティングノートを使う】

もう1つの方法は、Notionの「AIミーティングノート」を活用することです。

実際のコーチングセッションや、尊敬する人との対話をNotionで録音・文字起こしする。 その議事録から、相手の思考パターンや助言のスタイルを抽出して、メモリに登録する。

この方法の良いところは、"生の対話"がベースになることです。 書籍や動画よりも、実際の会話の中にこそ、その人の思考の癖や質問の核心が現れます。

人格設定は、一度やれば終わりではありません。 「今後はもっと厳しめにフィードバックして」「次からは具体的な数字を入れて」と伝えるだけで、AIの振る舞いがどんどんアップデートされていきます。

## ③ スキルを指定する

最後の設定が、"スキル"の登録です。

スキルとは、よく使う指示をNotionのページにまとめておき、コマンド一つで呼び出せるようにする仕組みです。

たとえば私は、こんなスキルを登録しています。

・「おはよう」→ カレンダーとタスクを取得し、1日の最適な動き方を提案 ・「日報」→ 今日やったことを振り返り、明日の優先事項を整理 ・「コンサル」→ 議事録の内容から課題を洗い出し、解決策を提案

つまり、「壁打ちの型」を事前に設計しておくということです。

設定方法はシンプル。

まずは、NotionAIのパーソナライズページに以下のような設定をしておきましょう。

![Image](https://pbs.twimg.com/media/HB50XsXa0AAJ58j?format=jpg&name=large)

スキルDBの中身は、以下のように「タイトル」「対応コマンド」を用意し、各ページ内に詳細な手順や参照先を記載します。

![Image](https://pbs.twimg.com/media/HB50acwaMAA26Fb?format=jpg&name=large)

**ポイント：「スキルを更新する」運用を追加しておく**

「このスキル、もうちょっとこうしたい」と思ったとき、毎回手動で編集するのは面倒です。 そこで、「スキルを更新して」と言うだけで、AIがスキルページを編集してくれるよう、事前に指示を追加しておきます。

こうすることで、使いながらスキルを洗練させることが可能です。

まとめ

NotionAIを"24時間働くコーチ"に変える3つの設定をまとめます。

① コンテキストを登録する（AIに"自分の状況"を渡す） ② メイン人格を指定する（理想のコーチをAIの中に再現する） ③ スキルを指定する（壁打ちの型をコマンド化する）

この3つを設定するだけで、NotionAIは"ただのチャットAI"から"あなた専属のコーチ"に変わります。

大事なのは、完璧に作り込むことではなく、まず設定して、使いながら育てること。 「もっとこうして」と自然言語で伝えるだけで、AIはどんどん賢くなっていきます。

